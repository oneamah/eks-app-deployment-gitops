name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for deployment
        required: false
        default: us-east-1
        type: string
      apply:
        description: Apply terraform changes (false runs plan only)
        required: false
        default: false
        type: boolean
  push:
    branches: ["main"]
    paths:
      - "infrastructure/**"
      - ".github/workflows/deploy-infrastructure.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  TF_IN_AUTOMATION: true
  LB_CERTIFICATE_ARN: arn:aws:acm:us-east-1:072754096540:certificate/4b5e7d68-8d5e-49e2-a57f-0a1045800819

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format
        run: terraform fmt --recursive -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan -var="lb_certificate_arn=${{ env.LB_CERTIFICATE_ARN }}"

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infrastructure/tfplan

  terraform-apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment:
      name: infra-prod
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infrastructure

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan -var="lb_certificate_arn=${{ env.LB_CERTIFICATE_ARN }}"
