apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.canaryName }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "frontend.fullname" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
