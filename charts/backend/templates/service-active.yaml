apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.activeName }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "backend.fullname" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
